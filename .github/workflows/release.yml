name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..${TAG} --pretty=format:"%s|%h" --no-merges)
          else
            COMMITS=$(git log ${TAG} --pretty=format:"%s|%h" --no-merges)
          fi

          FEATURES=""
          FIXES=""
          PERF=""
          REFACTOR=""
          DOCS=""
          MISC=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            MSG=$(echo "$line" | cut -d'|' -f1)
            SHA=$(echo "$line" | cut -d'|' -f2)

            case "$MSG" in
              feat*)    FEATURES="${FEATURES}\n- ${MSG} (${SHA})" ;;
              fix*)     FIXES="${FIXES}\n- ${MSG} (${SHA})" ;;
              perf*)    PERF="${PERF}\n- ${MSG} (${SHA})" ;;
              refactor*) REFACTOR="${REFACTOR}\n- ${MSG} (${SHA})" ;;
              docs*)    DOCS="${DOCS}\n- ${MSG} (${SHA})" ;;
              *)        MISC="${MISC}\n- ${MSG} (${SHA})" ;;
            esac
          done <<< "$COMMITS"

          NOTES=""
          [ -n "$FEATURES" ] && NOTES="${NOTES}## Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ] && NOTES="${NOTES}## Bug Fixes\n${FIXES}\n\n"
          [ -n "$PERF" ] && NOTES="${NOTES}## Performance\n${PERF}\n\n"
          [ -n "$REFACTOR" ] && NOTES="${NOTES}## Refactoring\n${REFACTOR}\n\n"
          [ -n "$DOCS" ] && NOTES="${NOTES}## Documentation\n${DOCS}\n\n"
          [ -n "$MISC" ] && NOTES="${NOTES}## Other Changes\n${MISC}\n\n"

          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
